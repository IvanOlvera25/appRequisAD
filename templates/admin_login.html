{% extends "layout.html" %}
{% block title %}Login Admin{% endblock %}
{% block content %}
<h2>Iniciar sesión como Administrador/Coordinador</h2>
<form method="POST" action="{{ url_for('admin_login') }}" class="form-container">
    <label for="username">Usuario:</label>
    <input type="text" name="username" id="username" required>

    <label for="password">Contraseña:</label>
    <input type="password" name="password" id="password" required>

    <!-- Checkbox para recordar sesión -->
    <div class="remember-me">
        <input type="checkbox" name="remember_me" id="remember_me" value="yes">
        <label for="remember_me">Recordar sesión</label>
    </div>

    <button type="submit">Iniciar Sesión</button>
</form>
{% if error %}
    <div class="mensaje-error">
        {{ error }}
    </div>
{% endif %}
{% endblock %}
